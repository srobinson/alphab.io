<body
    class="min-h-screen flex items-center justify-center p-6 antialiased selection:bg-white/20 selection:text-white bg-gradient-to-br transition-all duration-[1500ms] relative font-[Inter]">

    <!-- Dynamic Animated Background & Atmosphere Elements -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <!-- Storm Lightning Layer -->
        <div id="flash-layer" class="absolute z-1 inset-0 bg-white transition-opacity duration-75" style="opacity: 0;">
        </div>

        <!-- Glowing Orbs Layer -->
        <div id="bg-orbs" class="absolute inset-0 transition-opacity duration-[1500ms]" style="opacity: 1;">
            <div
                class="absolute top-1/4 left-1/4 w-96 h-96 bg-white/10 rounded-full mix-blend-overlay filter blur-3xl animate-[pulse_6s_ease-in-out_infinite]">
            </div>
            <div
                class="absolute top-1/3 right-1/4 w-96 h-96 bg-black/30 rounded-full mix-blend-overlay filter blur-3xl animate-[pulse_8s_ease-in-out_infinite]">
            </div>
            <div
                class="absolute -bottom-32 left-1/2 w-96 h-96 bg-white/5 rounded-full mix-blend-overlay filter blur-3xl animate-[pulse_10s_ease-in-out_infinite]">
            </div>
        </div>

        <!-- Typographic Art Background (Bangkok & Clock) -->
        <div
            class="absolute inset-0 flex items-center justify-between mix-blend-overlay opacity-40 transition-opacity duration-1000 overflow-hidden px-8 sm:px-20 pointer-events-none">
            <!-- Left: BANGKOK (Rotated Counter-Clockwise) -->
            <div class="w-0 flex items-center justify-center">
                <div id="bg-bangkok"
                    class="text-[12vh] sm:text-[16vh] md:text-[20vh] font-black tracking-tighter leading-none text-transparent bg-clip-text bg-gradient-to-b from-white/30 to-white/0 select-none whitespace-nowrap drop-shadow-2xl"
                    style="display: inline-block; transform: transform-origin: top; rotate(-90deg); scaleY(3.5);">
                    BANGKOK
                </div>
            </div>

            <!-- Right: Clock (Rotated Clockwise) -->
            <div class="w-0 flex items-center justify-center">
                <div id="bg-clock"
                    class="text-[12vh] sm:text-[16vh] md:text-[20vh] font-black tracking-tighter leading-none text-transparent bg-clip-text bg-gradient-to-b from-white/30 to-white/0 select-none tabular-nums whitespace-nowrap drop-shadow-2xl"
                    style="display: inline-block; transform: transform-origin: top;rotate(90deg); scaleY(3.5);">
                    00:00:00
                </div>
            </div>
        </div>

        <!-- Weather Particle Engine Layer -->
        <div id="weather-layer" class="absolute inset-0"></div>
    </div>

    <!-- Interactive Flip Card -->

        class="group [perspective:1000px] w-full max-w-xl h-[600px] sm:h-[500px] relative z-10 cursor-pointer mt-12 mb-24 sm:my-0">

        <div

            <!-- Front Face (Cover) -->
            <div
                class="absolute inset-0 [backface-visibility:hidden] bg-white/[0.04] backdrop-blur-2xl rounded-3xl border border-white/10 flex flex-col items-center justify-center p-8">
                <div

                    <img src="stu.portrait.png" alt="Stuart Robinson Portrait"

                </div>

            <!-- Back Face (Info) -->

                <!-- Content Container (Fades slightly when menu is open) -->

                    class="flex flex-col justify-between h-full transition-opacity duration-200 ease-out">
                    <div>

                        <main class="mb-8">

                                    Building <span
                                        class="font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-200 to-red-300"><a
                                            href="https://helioy.com"
                                            class="font-light text-transparent bg-clip-text bg-gradient-to-r from-orange-200 to-red-300 hover:from-orange-100 hover:to-red-200 transition-all">Helioy</a></span>

                    </div>

                    <footer class="pt-6 border-t border-white/10 relative">
                        <p class="text-base text-white/50 mb-4 font-bold">Find me on</p>
                        <div class="flex flex-wrap gap-3 sm:gap-4">
                            <a href="https://github.com/srobinson"
                                class="flex items-center gap-2 sm:gap-3 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all duration-300 text-white/70 hover:text-white/90 group/link font-bold">
                                <iconify-icon icon="solar:code-square-linear"
                                    class="text-white/50 group-hover/link:text-white/90 transition-colors text-lg sm:text-xl"
                                    style="stroke-width: 2;"></iconify-icon>
                                <span class="text-base sm:text-lg">GitHub</span>
                            </a>
                            <a href="https://x.com/srobinson"
                                class="flex items-center gap-2 sm:gap-3 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all duration-300 text-white/70 hover:text-white/90 group/link font-bold">
                                <iconify-icon icon="solar:global-linear"
                                    class="text-white/50 group-hover/link:text-white/90 transition-colors text-lg sm:text-xl"
                                    style="stroke-width: 2;"></iconify-icon>
                                <span class="text-base sm:text-lg">X</span>
                            </a>
                            <a href="https://www.linkedin.com/in/stu-uk"
                                class="flex items-center gap-2 sm:gap-3 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all duration-300 text-white/70 hover:text-white/90 group/link font-bold">
                                <iconify-icon icon="solar:case-minimalistic-linear"
                                    class="text-white/50 group-hover/link:text-white/90 transition-colors text-lg sm:text-xl"

                </div>

                <!-- Discreet Atmosphere Button -->
                <button id="easter-egg-btn"
                    class="absolute bottom-6 right-6 sm:bottom-8 sm:right-8 text-white/20 hover:text-white/70 transition-colors duration-200 z-20 outline-none"
                    title="Atmosphere Controls">
                    <iconify-icon icon="solar:tuning-square-linear" class="text-xl"
                        style="stroke-width: 2;"></iconify-icon>
                </button>

                <!-- Elegant Atmosphere Control Menu (Hidden by default) -->
                <div id="atmosphere-panel"
                    class="absolute inset-0 z-30 bg-black/70 backdrop-blur-3xl border border-white/10 p-6 sm:p-10 flex flex-col justify-center opacity-0 pointer-events-none transition-all duration-200 ease-out scale-[0.98] rounded-3xl">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-2xl font-black tracking-tight text-white/90">Atmosphere</h2>
                        <button id="close-atmosphere-btn"
                            class="text-white/50 hover:text-white/90 transition-colors duration-300 outline-none">
                            <iconify-icon icon="solar:close-circle-linear" class="text-2xl"
                                style="stroke-width: 2;"></iconify-icon>
                        </button>
                    </div>

                    <div class="space-y-5 sm:space-y-6">
                        <!-- Season Controls -->
                        <div class="space-y-3">
                            <label class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1">Season</label>
                            <div
                                class="flex w-full gap-1 bg-black/40 p-1.5 rounded-2xl border border-white/5 shadow-inner">
                                <button data-season="spring"
                                    class="season-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Spring</button>
                                <button data-season="summer"
                                    class="season-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Summer</button>
                                <button data-season="autumn"
                                    class="season-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Autumn</button>
                                <button data-season="winter"
                                    class="season-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Winter</button>
                            </div>
                        </div>

                        <!-- Time Controls -->
                        <div class="space-y-3">
                            <label class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1">Time of
                                Day</label>
                            <div
                                class="flex w-full gap-1 bg-black/40 p-1.5 rounded-2xl border border-white/5 shadow-inner">
                                <button data-time="morning"
                                    class="time-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Morning</button>
                                <button data-time="afternoon"
                                    class="time-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Afternoon</button>
                                <button data-time="evening"
                                    class="time-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Evening</button>
                                <button data-time="night"
                                    class="time-btn flex-1 px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Night</button>
                            </div>
                        </div>

                        <!-- Forecast Controls -->
                        <div class="space-y-3">
                            <label
                                class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1">Forecast</label>
                            <div class="flex w-full gap-1 bg-black/40 p-1.5 rounded-2xl border border-white/5 shadow-inner overflow-x-auto [&amp;::-webkit-scrollbar]:hidden"
                                style="scrollbar-width: none;">
                                <button data-weather="sunny"
                                    class="weather-btn flex-1 min-w-[50px] px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Sunny</button>
                                <button data-weather="cloudy"
                                    class="weather-btn flex-1 min-w-[50px] px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Cloudy</button>
                                <button data-weather="rainy"
                                    class="weather-btn flex-1 min-w-[50px] px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Rainy</button>
                                <button data-weather="windy"
                                    class="weather-btn flex-1 min-w-[50px] px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Windy</button>
                                <button data-weather="stormy"
                                    class="weather-btn flex-1 min-w-[50px] px-2 sm:px-3 py-2 sm:py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 text-white/50 hover:text-white/90 tracking-wide text-center border border-transparent">Stormy</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // --- Initialization ---
            const date = new Date();
            const month = date.getMonth();
            const hours = date.getHours();

            let currentSeason = 'winter';
            if (month >= 2 && month <= 4) currentSeason = 'spring';
            else if (month >= 5 && month <= 7) currentSeason = 'summer';
            else if (month >= 8 && month <= 10) currentSeason = 'autumn';

            let currentTime = 'night';
            if (hours >= 5 && hours < 12) currentTime = 'morning';
            else if (hours >= 12 && hours < 17) currentTime = 'afternoon';
            else if (hours >= 17 && hours < 20) currentTime = 'evening';

            let currentWeather = 'sunny';

            const palettes = {
                'spring': {
                    'morning': 'from-emerald-900 via-teal-900 to-cyan-950',
                    'afternoon': 'from-cyan-800 via-sky-900 to-blue-950',
                    'evening': 'from-indigo-900 via-purple-950 to-teal-950',
                    'night': 'from-slate-950 via-teal-950 to-emerald-950'
                },
                'summer': {
                    'morning': 'from-sky-900 via-blue-900 to-indigo-950',
                    'afternoon': 'from-amber-800 via-orange-900 to-rose-950',
                    'evening': 'from-rose-900 via-fuchsia-950 to-indigo-950',
                    'night': 'from-indigo-950 via-purple-950 to-slate-950'
                },
                'autumn': {
                    'morning': 'from-orange-900 via-amber-950 to-stone-900',
                    'afternoon': 'from-orange-800 via-red-950 to-rose-950',
                    'evening': 'from-red-950 via-purple-950 to-slate-950',
                    'night': 'from-slate-950 via-stone-950 to-orange-950'
                },
                'winter': {
                    'morning': 'from-slate-800 via-sky-950 to-blue-950',
                    'afternoon': 'from-sky-900 via-blue-950 to-indigo-950',
                    'evening': 'from-indigo-950 via-purple-950 to-slate-950',
                    'night': 'from-zinc-950 via-neutral-950 to-slate-950'
                }
            };

            const baseBodyClasses = "min-h-screen flex items-center justify-center p-6 antialiased selection:bg-white/20 selection:text-white bg-gradient-to-br transition-all duration-[1500ms] relative font-[Inter]";

            function updateBackground() {
                const bgClasses = palettes[currentSeason][currentTime];

                // Forecast Atmosphere Adjustments
                let weatherClasses = "";
                const orbs = document.getElementById('bg-orbs');

                // if (currentWeather === 'cloudy') {
                //     weatherClasses = "saturate-50 brightness-75";
                //     orbs.style.opacity = '0.3';
                // } else if (currentWeather === 'rainy') {
                //     weatherClasses = "saturate-50 brightness-90";
                //     orbs.style.opacity = '0.4';
                // } else if (currentWeather === 'stormy') {
                //     weatherClasses = "saturate-50 brightness-50";
                //     orbs.style.opacity = '0.2';
                // } else if (currentWeather === 'windy') {
                //     weatherClasses = "saturate-100 brightness-100";
                //     orbs.style.opacity = '0.8';
                // } else { // sunny
                //     weatherClasses = "saturate-150 brightness-110";
                //     orbs.style.opacity = '1';
                // }

                document.body.className = `${baseBodyClasses} ${bgClasses} ${weatherClasses}`;
                renderWeatherParticles(currentWeather);
            }

            // --- Weather Particle Engine ---
            let weatherReqId;
            let particles = [];
            const weatherLayer = document.getElementById('weather-layer');
            const flashLayer = document.getElementById('flash-layer');

            function renderWeatherParticles(type) {
                weatherLayer.innerHTML = '';
                particles = [];
                if (weatherReqId) cancelAnimationFrame(weatherReqId);
                flashLayer.style.opacity = '0';

                const count = (type === 'rainy' || type === 'stormy') ? 60 : (type === 'windy' ? 40 : 0);

                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    if (type === 'windy') {
                        // Wind dust/leaves
                        p.className = 'absolute bg-white/20 rounded-full w-1 h-1 sm:w-2 sm:h-px';
                        p.dataset.x = Math.random() * 100;
                        p.dataset.y = Math.random() * 100;
                        p.dataset.sx = 0.2 + Math.random() * 0.5; // X velocity
                        p.dataset.sy = (Math.random() - 0.5) * 0.1; // Y velocity
                    } else {
                        // Rain drops
                        p.className = `absolute bg-white/${type === 'stormy' ? '40' : '20'} w-[1px] h-6 sm:h-10`;
                        p.dataset.x = Math.random() * 100;
                        p.dataset.y = Math.random() * 100;
                        p.dataset.sx = (Math.random() - 0.5) * 0.05 + (type === 'stormy' ? 0.2 : 0); // Wind shear
                        p.dataset.sy = 0.5 + Math.random() * 1.5 + (type === 'stormy' ? 1.5 : 0); // Drop speed
                    }
                    weatherLayer.appendChild(p);
                    particles.push(p);
                }

                if (count > 0) {
                    const animateParticles = () => {
                        particles.forEach(p => {
                            let x = parseFloat(p.dataset.x);
                            let y = parseFloat(p.dataset.y);
                            x += parseFloat(p.dataset.sx);
                            y += parseFloat(p.dataset.sy);

                            // Boundaries wrap
                            if (x > 100) x = -5;
                            if (x < -5) x = 100;
                            if (y > 100) y = -10;

                            p.dataset.x = x;
                            p.dataset.y = y;
                            p.style.transform = `translate(${x}vw, ${y}vh)`;
                        });

                        // Lightning strikes
                        if (type === 'stormy' && Math.random() < 0.005) {
                            flashLayer.style.opacity = '0.7';
                            setTimeout(() => flashLayer.style.opacity = '0', 80);
                        }

                        weatherReqId = requestAnimationFrame(animateParticles);
                    };
                    weatherReqId = requestAnimationFrame(animateParticles);
                }
            }


            // --- Menu Toggle Logic ---
            const easterEggBtn = document.getElementById('easter-egg-btn');
            const closeAtmosphereBtn = document.getElementById('close-atmosphere-btn');
            const atmospherePanel = document.getElementById('atmosphere-panel');
            const cardContent = document.getElementById('card-content');

            function openPanel(e) {
                e.preventDefault();
                e.stopPropagation();
                atmospherePanel.classList.remove('opacity-0', 'pointer-events-none', 'scale-[0.98]');
                atmospherePanel.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
                cardContent.classList.add('opacity-10');
            }

            function closePanel(e) {
                e.preventDefault();
                e.stopPropagation();
                atmospherePanel.classList.add('opacity-0', 'pointer-events-none', 'scale-[0.98]');
                atmospherePanel.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                cardContent.classList.remove('opacity-10');
            }

            easterEggBtn.addEventListener('click', openPanel);
            closeAtmosphereBtn.addEventListener('click', closePanel);

            // --- Environment Controls Logic ---
            function updateActiveButtons() {
                document.querySelectorAll('.season-btn, .time-btn, .weather-btn').forEach(btn => {
                    btn.classList.remove('bg-white/10', 'text-white', 'shadow-sm', 'border-white/10');
                    btn.classList.add('text-white/50', 'border-transparent');
                });

                const activeSeasonBtn = document.querySelector(`.season-btn[data-season="${currentSeason}"]`);
                const activeTimeBtn = document.querySelector(`.time-btn[data-time="${currentTime}"]`);
                const activeWeatherBtn = document.querySelector(`.weather-btn[data-weather="${currentWeather}"]`);

                if (activeSeasonBtn) {
                    activeSeasonBtn.classList.add('bg-white/10', 'text-white', 'shadow-sm', 'border-white/10');
                    activeSeasonBtn.classList.remove('text-white/50', 'border-transparent');
                }

                if (activeTimeBtn) {
                    activeTimeBtn.classList.add('bg-white/10', 'text-white', 'shadow-sm', 'border-white/10');
                    activeTimeBtn.classList.remove('text-white/50', 'border-transparent');
                }

                if (activeWeatherBtn) {
                    activeWeatherBtn.classList.add('bg-white/10', 'text-white', 'shadow-sm', 'border-white/10');
                    activeWeatherBtn.classList.remove('text-white/50', 'border-transparent');
                }
            }

            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentSeason = e.target.dataset.season;
                    updateActiveButtons();
                    updateBackground();
                });
            });

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentTime = e.target.dataset.time;
                    updateActiveButtons();
                    updateBackground();
                });
            });

            document.querySelectorAll('.weather-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentWeather = e.target.dataset.weather;
                    updateActiveButtons();
                    updateBackground();
                });
            });

            // --- Typographic Clock & Breathing Animation Logic ---
            const bgBangkok = document.getElementById('bg-bangkok');
            const bgClock = document.getElementById('bg-clock');
            let lastSecond = -1;

            function updateClock() {
                const now = new Date();
                const currentSecond = now.getSeconds();

                if (currentSecond !== lastSecond) {
                    lastSecond = currentSecond;
                    if (bgClock) {
                        const options = {
                            timeZone: 'Asia/Bangkok',
                            hour12: false,
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit'
                        };
                        bgClock.textContent = now.toLocaleTimeString('en-US', options);
                    }
                }

                // Breathing animation applied to the scaleY (around 1.5x)
                const animationTime = Date.now() / 2000;
                const scaleY = 1.5 + Math.sin(animationTime) * 0.1;

                if (bgBangkok) bgBangkok.style.transform = `rotate(-90deg) scaleY(${scaleY})`;
                if (bgClock) bgClock.style.transform = `rotate(90deg) scaleY(${scaleY})`;

                requestAnimationFrame(updateClock);
            }

            // Initialize app
            updateBackground();
            updateActiveButtons();
            updateClock();
        });
    </script>

</body>

</html>
